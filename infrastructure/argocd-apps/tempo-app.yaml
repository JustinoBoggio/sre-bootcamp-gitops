apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tempo
  namespace: argocd
spec:
  project: default
  source:
    chart: tempo
    repoURL: 'https://grafana.github.io/helm-charts'
    targetRevision: 1.7.2 # Stable version
    helm:
      values: |
        tempo:
          storage:
            trace:
              backend: local
              local:
                path: /var/tempo/traces
        compactor:
          config:
            compaction:
              block_retention: 1h # Delete old blocks after 1 hour to save disk space
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true