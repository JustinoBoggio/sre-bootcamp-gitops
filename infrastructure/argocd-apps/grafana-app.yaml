apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
  namespace: argocd
spec:
  project: default
  source:
    chart: grafana
    repoURL: 'https://grafana.github.io/helm-charts'
    targetRevision: 7.0.0
    helm:
      values: |
        persistence:
          enabled: true
          size: 1Gi
        admin:
          existingSecret: "grafana-admin-secret"
          userKey: admin-user
          passwordKey: admin-password
        datasources:
          datasources.yaml:
            apiVersion: 1
            datasources:
            - name: Loki
              type: loki
              url: http://loki:3100
              uid: loki-datasource
              access: proxy
              isDefault: true
              jsonData:
                derivedFields:
                  - datasourceUid: tempo-datasource
                    matcherRegex: '"trace_id":"(\w+)"'
                    name: TraceID
                    url: '$${__value.raw}'
            - name: Tempo
              type: tempo
              uid: tempo-datasource
              url: http://tempo:3100
              access: proxy
            - name: Prometheus
              type: prometheus
              uid: prometheus-datasource
              url: http://prometheus-server:80
              access: proxy
        dashboardProviders:
          dashboardproviders.yaml:
            apiVersion: 1
            providers:
            - name: 'default'
              orgId: 1
              folder: 'Infrastructure SRE'
              type: file
              disableDeletion: false
              editable: true
              options:
                path: /var/lib/grafana/dashboards/default
        dashboards:
          default:
            kubernetes-cluster:
              gnetId: 315
              revision: 3
              datasource: Prometheus
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true