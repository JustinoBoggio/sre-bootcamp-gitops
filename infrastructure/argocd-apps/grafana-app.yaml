apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
  namespace: argocd
spec:
  project: default
  source:
    chart: grafana
    repoURL: 'https://grafana.github.io/helm-charts'
    targetRevision: 7.0.0
    helm:
      values: |
        persistence:
          enabled: true
          size: 1Gi
        admin:
          existingSecret: "grafana-admin-secret"
          userKey: admin-user
          passwordKey: admin-password
        datasources:
          datasources.yaml:
            apiVersion: 1
            datasources:
            - name: Loki
              type: loki
              url: http://loki:3100
              access: proxy
              isDefault: true
              jsonData:
                derivedFields:
                  - datasourceUid: tempo-datasource
                    matcherRegex: '"trace_id":"(\w+)"'
                    name: TraceID
                    url: '$${__value.raw}'
            - name: Tempo
              type: tempo
              uid: tempo-datasource
              url: http://tempo:3100
              access: proxy
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true