apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: reloader
  namespace: argocd
spec:
  project: default
  source:
    chart: reloader
    repoURL: 'https://stakater.github.io/stakater-charts'
    targetRevision: 1.0.69 # pin the version to avoid surprises
    helm:
      values: |
        reloader:
          isArgoRollouts: false
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: kube-system # In this namespace usually go tools like reloader, cert-manager, etc.
  syncPolicy:
    automated:
      prune: true
      selfHeal: true