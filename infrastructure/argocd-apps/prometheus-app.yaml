apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus
  namespace: argocd
spec:
  project: default
  source:
    chart: prometheus
    repoURL: 'https://prometheus-community.github.io/helm-charts'
    targetRevision: 25.17.0
    helm:
      values: |
        server:
          persistentVolume:
            enabled: false
          # Prometheus accepts push connections
          extraFlags:
            - web.enable-remote-write-receiver
        alertmanager:
          enabled: true
          extraSecretMounts:
            - name: slack-webhook-vol
              mountPath: /etc/secrets/slack
              secretName: alertmanager-slack-webhook
              readOnly: true
          config:
            route:
              group_by: ['alertname', 'node']
              group_wait: 10s
              group_interval: 1m
              receiver: 'slack-sre'
            receivers:
              - name: 'slack-sre'
                slack_configs:
                  # Read the Slack webhook URL from a Kubernetes secret
                  - api_url_file: '/etc/secrets/slack/url'
                    channel: '#sre-alerts'
                    send_resolved: true
                    title: '[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }} ({{ .Alerts | len }} alerts)'
                    text: >-
                      {{ range .Alerts }}
                        *Severity:* `{{ .Labels.severity }}`
                        *Node:* {{ .Labels.node }}
                        *Details:* {{ .Annotations.summary }}
                      {{ end }}
            inhibit_rules:
              - source_matchers:
                  - alertname="NodeDown"
                target_matchers:
                  - severity="critical"
                equal: ['node']
        pushgateway:
          enabled: false
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true