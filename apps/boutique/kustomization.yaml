apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - https://raw.githubusercontent.com/GoogleCloudPlatform/microservices-demo/v0.8.0/release/kubernetes-manifests.yaml
  #- otel-alias.yaml

patches:
  - target:
      version: v1
      kind: Service
      name: frontend-external
    patch: |-
      - op: replace
        path: /spec/type
        value: ClusterIP
  - target:
      kind: Deployment
      name: "^(frontend|cartservice|checkoutservice|currencyservice|emailservice|paymentservice|productcatalogservice|recommendationservice|shippingservice|adservice|loadgenerator)$"
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://otel-collector.observability.svc.cluster.local:4317"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: COLLECTOR_SERVICE_ADDR
          value: "otel-collector.observability.svc.cluster.local:4317"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: ENABLE_TRACING
          value: "1"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: OTEL_SERVICE_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.labels['app']
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: OTEL_METRICS_EXPORTER
          value: "otlp"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: OTEL_EXPORTER_OTLP_METRICS_ENDPOINT
          value: "http://otel-collector.observability.svc.cluster.local:4318/v1/metrics"
  - target:
      kind: Deployment
      name: "^(frontend|cartservice|checkoutservice|currencyservice|emailservice|paymentservice|productcatalogservice|recommendationservice|shippingservice|adservice|loadgenerator)$"
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: any
      spec:
        template:
          metadata:
            annotations:
              prometheus.io/scrape: "true"
  - target:
      version: v1
      kind: Deployment
      name: frontend
    patch: |-
      - op: replace
        path: /apiVersion
        value: argoproj.io/v1alpha1
      - op: replace
        path: /kind
        value: Rollout
      - op: replace
        path: /spec/replicas
        value: 5
      - op: add
        path: /spec/strategy
        value:
          canary:
            steps:
            - setWeight: 20
            - pause: 
                duration: 60s
            - setWeight: 50
            - pause: 
                duration: 60s
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: NEW_VERSION
          value: "v3.0.0"