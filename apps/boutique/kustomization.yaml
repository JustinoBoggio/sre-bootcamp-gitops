apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - https://raw.githubusercontent.com/GoogleCloudPlatform/microservices-demo/v0.8.0/release/kubernetes-manifests.yaml
  - otel-alias.yaml

patches:
  - target:
      version: v1
      kind: Service
      name: frontend-external
    patch: |-
      - op: replace
        path: /spec/type
        value: ClusterIP